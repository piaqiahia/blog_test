{% extends 'tend/common/base.html' %}
{% import "tend/macros/_flash.html" as flash_macros %}
{% block title %}登陆-何三笔记{% endblock %}
{% block main %}
<div class="container">
    <div class="row">
        <div class="col-12 col-sm-8 col-md-6 offset-sm-2 offset-md-3 px-xl-5">
            <div class="card rounded-0 px-3 px-lg-4">
                <div class="card-header text-center bg-white py-2">
                    <h3 class="my-1 text-info">登录</h3>
                </div>
                <div class="card-body card-login">
                    <form class="login" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        {{flash_macros.flash_msg()}}
                        <div id="div_id_login" class="form-group">
                            <label for="username" class="col-form-label requiredField">
                                账号<span class="asteriskField">*</span> </label>
                            <div class="">
                                <input type="text" class="form-control" autofocus name="username" placeholder="账号或邮箱"
                                    required>
                            </div>
                        </div>
                        <div id="div_id_password" class="form-group">
                            <label for="password" class="col-form-label  requiredField">
                                密码<span class="asteriskField">*</span> </label>
                            <div class="">
                                <input type="password" class="form-control" name="password" required placeholder="密码">
                            </div>
                        </div>
                        <div class="form-group">
                            <div id="div_id_remember" class="form-check">
                                <label for="remember_me" class="form-check-label">
                                    <input type="checkbox" class="checkboxinput form-check-input" name="remember_me">
                                    记住我
                                </label>
                            </div>
                        </div>
                        <a class="secondaryAction" href="{{url_for('.regist')}}">注册</a>
                        <a class="secondaryAction" href="{{url_for('main.account.password_reset')}}">忘记密码了？</a>
                        <button type="submit" class="pull-right btn btn-info btn-sm rounded-2">登录</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
