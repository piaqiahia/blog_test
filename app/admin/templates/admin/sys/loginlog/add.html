{% extends 'admin/common/base.html' %}
{% block css %}
{{super()}}
<link href="{{url_for('admin.static',filename='ajax/libs/jasny/jasny-bootstrap.min.css')}}?v=3.1.3" rel="stylesheet"/>
<link href="{{url_for('admin.static',filename='ajax/libs/datapicker/bootstrap-datetimepicker.min.css')}}" rel="stylesheet"/>
{% endblock %}
{% block body %}
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form">
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">登录账号：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="login_name" id="login_name" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">登录ip：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="ipaddr" id="ipaddr" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">登录地点：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="login_location" id="login_location" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">浏览器类型：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="browser" id="browser" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">操作系统：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="ossystem" id="ossystem" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">登录状态：</label>
				<div class="col-sm-8">
                    <select id="state" name="state" class="form-control m-b">
						{% for dd in get_dict_data('sys_loginlog_state')%}
						<option value="{{dd.value}}" {{'selected' if dd.is_default == 'Y' else ''}}>{{dd.label}}</option>
						{% endfor %}
					</select>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">提示消息：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="msg" id="msg" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">访问时间：</label>
				<div class="col-sm-8">
                    <div class="input-group date">
                        <input name="login_time" class="form-control dtp" placeholder="yyyy-MM-dd" type="text" required>
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
				</div>
			</div>
		</form>
	</div>
</body>
{% endblock %}
{% block js %}
{{ super() }}
<script src="{{url_for('admin.static',filename='ajax/libs/jasny/jasny-bootstrap.min.js')}}?v=3.1.3"></script>
<script src="{{url_for('admin.static',filename='ajax/libs/datapicker/bootstrap-datetimepicker.min.js')}}"></script>
<script type="text/javascript">

    $(".dtp").datetimepicker({
        format: 'yyyy-mm-dd',
        minView: "month",
        todayBtn:  true,
        autoclose: true,
    })

    
    $("#form").validate({

    });
    
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save("{{url_for('admin.sys.loginlog.add')}}", $('#form').serialize());
        }
    }

</script>
{% endblock %}
