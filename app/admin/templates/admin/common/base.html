<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="renderer" content="webkit">
        <meta name="csrf-token" content="{{ csrf_token() }}">
        <!-- 避免IE使用兼容模式 -->
 	    <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>{% block title %}系统{% endblock %}</title>
        <link rel="shortcut icon" href="{{url_for('main.static',filename='img/favicon.ico')}}" type="image/x-icon"/>
        {% block css %}
        <link href="favicon.ico" rel="shortcut icon"/>
        <link href="{{url_for('admin.static',filename='css/bootstrap.min.css')}}" rel="stylesheet"/>
        <link href="{{url_for('admin.static',filename='css/font-awesome.min.css')}}" rel="stylesheet"/>
        <!-- bootstrap-table 表格插件样式 -->
	    <link href="{{url_for('admin.static',filename='ajax/libs/bootstrap-table/bootstrap-table.min.css')}}?v=20210202" rel="stylesheet"/>
        <link href="{{url_for('admin.static',filename='css/animate.css')}}" rel="stylesheet"/>
        <link href="{{url_for('admin.static',filename='css/style.css')}}" rel="stylesheet"/>
        <link href="{{url_for('admin.static',filename='css/skins.css')}}" rel="stylesheet"/>
        <link href="{{url_for('admin.static',filename='ruoyi/css/ry-ui.css')}}?v=4.6.1" rel="stylesheet"/>
        {% endblock %}
        
    </head>
    {% block body %}
    <body class="white-bg">
        {% block content %}
        {% endblock %}
    </body>
    {% endblock %}

    <!--js合集-->
    {% block js %}
    <!-- 全局js -->
    <script src="{{url_for('admin.static',filename='js/jquery.min.js')}}"></script>
    <script src="{{url_for('admin.static',filename='js/bootstrap.min.js')}}"></script>

    <!-- bootstrap-table 表格插件 -->
    <script src="{{url_for('admin.static',filename='ajax/libs/bootstrap-table/bootstrap-table.min.js')}}?v=20210202"></script>
    <script src="{{url_for('admin.static',filename='ajax/libs/bootstrap-table/locale/bootstrap-table-zh-CN.min.js')}}?v=20210202"></script>
    <script src="{{url_for('admin.static',filename='ajax/libs/bootstrap-table/extensions/mobile/bootstrap-table-mobile.min.js')}}?v=20210202"></script>
    <!-- jquery-validate 表单验证插件 -->
    <script src="{{url_for('admin.static',filename='ajax/libs/validate/jquery.validate.min.js')}}"></script>
    <script src="{{url_for('admin.static',filename='ajax/libs/validate/messages_zh.min.js')}}"></script>
    <script src="{{url_for('admin.static',filename='ajax/libs/validate/jquery.validate.extend.js')}}"></script>
    <!-- jquery-validate 表单树插件 -->
    <script src="{{url_for('admin.static',filename='ajax/libs/bootstrap-treetable/bootstrap-treetable.js')}}"></script>
    <!-- 遮罩层 -->
    <script src="{{url_for('admin.static',filename='ajax/libs/blockUI/jquery.blockUI.js')}}"></script>
    <script src="{{url_for('admin.static',filename='ajax/libs/iCheck/icheck.min.js')}}"></script>
    <script src="{{url_for('admin.static',filename='ajax/libs/layer/layer.min.js')}}"></script>
    <script src="{{url_for('admin.static',filename='ajax/libs/layui/layui.js')}}"></script>
    <script src="{{url_for('admin.static',filename='ruoyi/js/common.js')}}?v=4.6.1"></script>
    <script src="{{url_for('admin.static',filename='ruoyi/js/ry-ui.js')}}?v=4.6.1"></script>
    {% endblock %}
</html>
