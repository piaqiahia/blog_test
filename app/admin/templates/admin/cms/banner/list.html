{% extends 'admin/common/base.html' %}
{% block body %}

<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="role-form">
                    <div class="select-list">
                        <ul>
                            <li>
                                名称：<input type="text" name="name" />
                            </li>
                            <li>
                                类型：<input type="text" name="mtype" />
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i
                                    class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i
                                        class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success {{check_perms('cms:banner:add')}}" onclick="$.operate.add()">
                    <i class="fa fa-plus"></i> 新增
                </a>
                <a class="btn btn-primary single disabled {{check_perms('cms:banner:edit')}}" onclick="$.operate.edit()">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled {{check_perms('cms:banner:remove')}}" onclick="$.operate.removeAll()">
                    <i class="fa fa-remove"></i> 删除
                </a>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
</body>
{% endblock %}
{% block js %}
{{ super() }}
<script>
    var editFlag = "{{check_perms('cms:banner:edit')}}";
    var removeFlag = "{{check_perms('cms:banner:remove')}}";
    $(function () {
        var options = {
            url: "{{url_for('admin.cms.banner.list')}}",
            createUrl: "{{url_for('admin.cms.banner.add')}}",
            updateUrl: "{{url_for('admin.cms.banner.edit')}}?id={id}",
            removeUrl: "{{url_for('admin.cms.banner.remove')}}",
            exportUrl: "{{url_for('admin.cms.banner.export')}}",
            modalName: "横幅",
            columns: [
            {
                checkbox: true
            },
            {
                field: 'id',
                title: 'ID',
                visible: false
            },
            {
                field: 'name',
                title: '名称'
            },
            {
                field: 'mtype',
                title: '类型'
            },
            {
                field: 'img',
                title: '图片',
                formatter: function(value, row, index) {
                    return $.table.imageView(value);
                }
            },
            {
                field: 'order_num',
                title:'排序'
            },
            {
                field: 'url',
                title: '链接'
            },
            {
                field: 'remark',
                title: '备注',
                formatter: function(value, row, index) {
                    return $.table.tooltip(value, 10, "open");
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function (value, row, index) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                    actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a> ');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });

</script>
{% endblock %}
