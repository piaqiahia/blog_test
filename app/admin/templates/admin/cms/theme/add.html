{% extends 'admin/common/base.html' %}
{% block css %}
{{super()}}
<link href="{{url_for('admin.static',filename='ajax/libs/jasny/jasny-bootstrap.min.css')}}?v=3.1.3" rel="stylesheet"/>
{% endblock %}
{% block body %}
<body class="white-bg">
	<div class="wrapper wrapper-content animated fadeInRight ibox-content">
		<form class="form-horizontal m" id="form">
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">主题名称：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="name" id="name" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">主题代码：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="code" id="code" value="" required>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label ">主题描述：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="description" id="description" value="" >
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label ">预览图片：</label>
				<div class="col-sm-8">
                    <div class="fileinput fileinput-new" data-provides="fileinput">
                        <div class="fileinput-new thumbnail" style="max-width: 300px;min-width: 140px;">
                            <img src="">
                        </div>
                        <div class="fileinput-preview fileinput-exists thumbnail" style="max-width: 200px; max-height: 150px;"></div>
                        <div>
                            <span class="btn btn-white btn-file"><span class="fileinput-new">选择图片</span><span class="fileinput-exists">更改</span><input type="file" name="preview_img"></span>
                            <a href="#" class="btn btn-white fileinput-exists" data-dismiss="fileinput">清除</a>
                        </div>
                    </div>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label ">作者：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="author" id="author" value="" >
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label ">版本号：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="version" id="version" value="" >
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label is-required">是否激活：</label>
				<div class="col-sm-8">
                    <select id="is_active" name="is_active" class="form-control m-b">
						{% for dd in get_dict_data('theme_is_active')%}
						<option value="{{dd.value}}" {{'selected' if dd.is_default == 'Y' else ''}}>{{dd.label}}</option>
						{% endfor %}
					</select>
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label ">排序：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="sn" id="sn" value="" >
				</div>
			</div>
            <div class="form-group">
				<label class="col-sm-3 control-label ">备注：</label>
				<div class="col-sm-8">
					<input class="form-control" type="text" name="remark" id="remark" value="" >
				</div>
			</div>
		</form>
	</div>
</body>
{% endblock %}
{% block js %}
{{ super() }}
<script src="{{url_for('admin.static',filename='ajax/libs/jasny/jasny-bootstrap.min.js')}}?v=3.1.3"></script>
<script type="text/javascript">

    
    $("#form").validate({

    });
    
    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save("{{url_for('admin.cms.theme.add')}}", new FormData(document.getElementById('form')));
        }
    }

</script>
{% endblock %}
