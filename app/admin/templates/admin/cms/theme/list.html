{% extends 'admin/common/base.html' %}
{% block css %}
{{super()}}
<style>
    .ibox.border-success {
        border: 2px solid #28a745 !important;
        box-shadow: 0 0 10px rgba(40, 167, 69, 0.2);
    }
</style>
{% endblock %}
{% block body %}

<body class="gray-bg">
    <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="role-form">
                    <div class="select-list">
                        <ul>
                            <li>
                                主题名称：<input type="text" name="name" />
                            </li>
                            <li>
                                主题代码：<input type="text" name="code" />
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i
                                        class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i
                                        class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success {{check_perms('cms:theme:scan')}}" onclick="scan()">
                    <i class="fa fa-refresh"></i> 扫描
                </a>
            </div>

            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table" data-page-size="10" data-show-custom-view="true"
                    data-custom-view="customViewFormatter" data-custom-view-default-view="true">
                </table>
            </div>
        </div>
    </div>

    <template id="profileTemplate">
        <div class="col-sm-4">
            <div class="ibox %is_active_class%">
                <div class="ibox-title">
                    <span class="label label-primary pull-right">NEW</span>
                    <h5>%name%</h5>
                </div>
                <div class="ibox-content">
                    <h4>主题描述</h4>
                    <p>
                        %description%
                    </p>
                    <div>
                        <span>作者：</span>
                        %author%
                    </div>
                    <div>
                        <span>版本号：</span>
                        %version%
                    </div>
                    <div>
                        <span>是否激活：</span>
                        %is_active%
                    </div>
                    <div class="text-center mt-3">
                        %activate_button%
                        %delete_button%
                    </div>
                </div>
            </div>
        </div>
    </template>
</body>
{% endblock %}
{% block js %}
{{ super() }}
<script
    src="{{url_for('admin.static',filename='ajax/libs/bootstrap-table/extensions/custom-view/bootstrap-table-custom-view.js')}}"></script>
<script>
    var editFlag = "{{check_perms('cms:theme:edit')}}";
    var removeFlag = "{{check_perms('cms:theme:remove')}}";
    var is_active_datas = {{ get_dict_data('theme_is_active') | tojson | safe}};
    $(function () {
        var options = {
            url: "{{url_for('admin.cms.theme.list')}}",
            createUrl: "{{url_for('admin.cms.theme.add')}}",
            updateUrl: "{{url_for('admin.cms.theme.edit')}}?id={id}",
            removeUrl: "{{url_for('admin.cms.theme.remove')}}",
            exportUrl: "{{url_for('admin.cms.theme.export')}}",
            modalName: "网站主题",
            columns: [
                {
                    checkbox: true
                },
                {
                    field: 'id',
                    title: 'ID',
                    visible: false
                },
                {
                    field: 'name',
                    title: '主题名称'
                },
                {
                    field: 'code',
                    title: '主题代码'
                },
                {
                    field: 'description',
                    title: '主题描述'
                },
                {
                    field: 'author',
                    title: '作者'
                },
                {
                    field: 'version',
                    title: '版本号'
                },
                {
                    field: 'is_active',
                    title: '是否激活',
                    formatter: function (value, row, index) {
                        return $.table.selectDictLabel(is_active_datas, value);
                    }
                },
                {
                    field: 'sn',
                    title: '排序'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function (value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a> ');
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    });

    function scan() {
        $.operate.post("{{url_for('admin.cms.theme.scan')}}", {}, function (res) {
            if (res.code == 200) {
                $.table.search();
            }
        });
    }

    function customViewFormatter(data) {
        var template = $('#profileTemplate').html()
        var view = ''
        $.each(data, function (i, row) {
            var isActiveClass = row.is_active ? 'border-success' : '';
            var activateButton = '';
            var deleteButton = '';

            if (!row.is_active) {
                activateButton = `<button class="btn btn-success btn-sm" onclick="activateTheme(${row.id})">
                    <i class="fa fa-check"></i> 激活
                </button>`;
            } else {
                activateButton = `<span class="badge badge-info"><i class="fa fa-check-circle"></i> 已激活</span>`;
            }

            // 添加删除按钮
            deleteButton = `<button class="btn btn-danger btn-sm ml-2" onclick="$.operate.remove(${row.id})">
                <i class="fa fa-trash"></i> 删除
            </button>`;

            view += template.replace('%name%', row.name)
                .replace('%code%', row.code)
                .replace('%description%', row.description)
                .replace('%author%', row.author)
                .replace('%version%', row.version)
                .replace('%is_active%', row.is_active ? '已激活' : '未激活')
                .replace('%is_active_class%', isActiveClass)
                .replace('%activate_button%', activateButton)
                .replace('%delete_button%', deleteButton);
        })

        return `<div class="row mx-0">${view}</div>`
    }

    function activateTheme(themeId) {
        $.operate.get("{{url_for('admin.cms.theme.activate')}}?id=" + themeId, {}, function (res) {
            if (res.code == 200) {
                $.table.search();
            }
        });
    }

</script>
{% endblock %}
