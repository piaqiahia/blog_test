name: CI/CD with Allure and JMeter

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1511054331
          MYSQL_DATABASE: h3blog
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -p1511054331"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    # 1-5. 保持不变
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"

    - name: Wait for MySQL
      run: |
        for i in {1..30}; do
          if mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 -e "SELECT 1"; then
            echo "MySQL is ready!"
            break
          fi
          echo "Waiting for MySQL... ($i/30)"
          sleep 2
        done

    - name: Import Database Schema and Data
      run: |
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 -e "CREATE DATABASE IF NOT EXISTS h3blog;"
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 h3blog < sql/01-create-db.sql
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 h3blog < sql/02-data-dump.sql
        echo "Database imported successfully!"

    - name: Start Flask App in Background
      run: |
        mkdir -p logs
        export FLASK_APP=app
        flask run --host=0.0.0.0 --port=5000 &
        echo "Waiting for Flask to start..."
        sleep 15
        curl http://127.0.0.1:5000 || echo "Flask might not be up yet"

    # 6. 运行单元测试（保持不变）
    - name: Run tests
      run: |
        pytest h3blog_test/testcases -v \
          --alluredir=allure-results \
          --html=reports/report.html \
          --self-contained-html
      env:
        DATABASE_URL: mysql+pymysql://root:1511054331@127.0.0.1:3306/h3blog
        REDIS_URL: redis://127.0.0.1:6379/1
      continue-on-error: true

    # 7. 【新增】下载并运行 JMeter
    - name: Download and Setup JMeter
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        export PATH=$(pwd)/apache-jmeter-5.6.3/bin:$PATH
        jmeter --version

    - name: Run JMeter Load Test
      run: |
        # 运行 JMeter 压测
        # 注意：jmx 文件在 jmeter/blog_test1.jmx
        # 报告输出到 jmeter/report_html/
        jmeter -n -t jmeter/blog_test1.jmx \
          -l jmeter/result.jtl \
          -e -o jmeter/report_html \
          -Jhost=127.0.0.1 \
          -Jport=5000
      
    - name: Check JMeter Results
      run: |
        echo "=== JMeter Summary ==="
        # 提取摘要信息
        tail -20 jmeter/result.jtl
        
        # 检查是否有错误（s="false" 表示失败）
        if grep -q "s=\"false\"" jmeter/result.jtl; then
          echo "✗ JMeter test had errors"
          exit 1
        else
          echo "✓ JMeter test passed with 0 errors"
        fi

    # 8. 【新增】复制 JMeter 报告到 allure-report 目录以便一起部署到 Pages
    - name: Copy JMeter Report to Allure Report Dir
      run: |
        # 创建 jmeter 子目录在 allure-report 中
        mkdir -p allure-report/jmeter
        # 复制整个报告目录
        cp -r jmeter/report_html/* allure-report/jmeter/
        echo "JMeter report copied to allure-report/jmeter/"

    # 9. 生成 Allure 报告（保持不变）
    - name: Generate Allure Report
      run: |
        curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.36.0/allure-2.36.0.zip
        unzip allure.zip -d allure
        ALLURE_BIN=$(pwd)/allure/allure-2.36.0/bin/allure
        $ALLURE_BIN generate allure-results -o allure-report --clean

    # 10. 部署到 GitHub Pages（现在包含 Allure 和 JMeter 报告）
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        destination_dir: allure-report
        keep_files: true

    # 11. 上传测试报告 Artifacts
    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report-artifacts
        path: |
          reports/report.html
          allure-report/

    # 12. 【新增】单独上传 JMeter 报告作为 artifact
    - name: Upload JMeter Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jmeter-report
        path: jmeter/report_html/
