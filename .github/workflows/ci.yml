name: CI/CD with Allure and JMeter

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1511054331
          MYSQL_DATABASE: h3blog
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -p1511054331"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    # 1-5. 基础环境准备
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre wget

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"

    - name: Wait for MySQL
      run: |
        for i in {1..30}; do
          if mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 -e "SELECT 1"; then
            echo "MySQL is ready!"
            break
          fi
          echo "Waiting for MySQL... ($i/30)"
          sleep 2
        done

    - name: Import Database Schema and Data
      run: |
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 -e "CREATE DATABASE IF NOT EXISTS h3blog;"
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 h3blog < sql/01-create-db.sql
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 h3blog < sql/02-data-dump.sql
        echo "Database imported successfully!"

    - name: Start Flask App (Fallback to flask run)
      run: |
        mkdir -p logs
        export FLASK_APP=app
        flask run --host=0.0.0.0 --port=5000 > logs/flask.log 2>&1 &

        echo "Waiting for Flask to start..."
        sleep 60  # 增加到 60 秒，给足初始化时间

        # 优化：使用循环重试 + 正确的状态码检查
        success=false
        for i in {1..20}; do
          echo "Checking Flask health... ($i/20)"

          # 方法1：检查状态码是否为 200
          status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000 2>&1 || echo "000")

          if [ "$status" = "200" ]; then
            echo "✓ Flask is running with status 200!"
            success=true
            break
          fi

          sleep 3
        done

        # 最终验证
        if [ "$success" != "true" ]; then
          echo "✗ Flask failed to start after multiple attempts"
          tail -100 logs/flask.log
          exit 1
        fi

    # 6. 运行单元测试
    - name: Run tests
      run: |
        # 清理旧的 Allure 结果
        rm -rf allure-results
        rm -rf reports/report.html
        
        pytest h3blog_test/testcases -v \
          --alluredir=allure-results \
          --html=reports/report.html \
          --self-contained-html
      env:
        DATABASE_URL: mysql+pymysql://root:1511054331@127.0.0.1:3306/h3blog
        REDIS_URL: redis://127.0.0.1:6379/1
      continue-on-error: true

    - name: Check Homepage and Extract Article ID
      run: |
        echo "=== Checking if homepage has articles ==="

        # 获取首页 HTML
        curl http://127.0.0.1:5000/ > /tmp/homepage.html

        # 直接打印 HTML 内容（调试用）
        echo "=== Homepage HTML Content ==="
        cat /tmp/homepage.html
        echo "=== End of HTML Content ==="

        # 检查是否有文章链接
        if grep -q 'href="/article/' /tmp/homepage.html; then
          echo "✓ Homepage has article links"

          # 提取第一个文章 ID
          ARTICLE_ID=$(grep -o 'href="/article/[^"]*"' /tmp/homepage.html | head -1 | sed 's/.*href="\/article\/\([^"]*\)".*/\1/')
          echo "First article ID found: $ARTICLE_ID"

          # 替换到 JMX 中
          sed -i "s|/article/\${articleId}/|/article/$ARTICLE_ID/|" jmeter/blog_test1.jmx
          echo "Updated JMX to use article ID: $ARTICLE_ID"
        else
          echo "✗ No article links found on homepage!"
          echo "Using fallback ID: 1"
          sed -i 's|/article/${articleId}/|/article/1/|' jmeter/blog_test1.jmx
        fi

    # 8. 下载并运行 JMeter
    - name: Download and Setup JMeter
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        ./apache-jmeter-5.6.3/bin/jmeter --version

    - name: Run JMeter Load Test
      run: |
        rm -rf jmeter/report_html jmeter/result.jtl
        
        # 降低并发，避免超时
        timeout 300 ./apache-jmeter-5.6.3/bin/jmeter -n -t jmeter/blog_test1.jmx \
          -l jmeter/result.jtl \
          -e -o jmeter/report_html \
          -Jhost=127.0.0.1 \
          -Jport=5000 \
          -Jthreads=10 \
          -Jloop=2

    - name: Check JMeter Results
      run: |
        echo "=== JMeter Summary ==="
        tail -20 jmeter/result.jtl
        if grep -q "s=\"false\"" jmeter/result.jtl; then
          echo "✗ JMeter test had errors"
          exit 1
        else
          echo "✓ JMeter test passed"
        fi

    # 9. 生成 Allure 报告
    - name: Generate Allure Report
      run: |
        rm -rf allure allure-report/*
        curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.36.0/allure-2.36.0.zip
        unzip allure.zip -d allure
        ALLURE_BIN=$(pwd)/allure/allure-2.36.0/bin/allure
        $ALLURE_BIN generate allure-results -o allure-report --clean

    # 10. 准备 JMeter 报告
    - name: Prepare Standalone JMeter Report for Deploy
      run: |
        # 1. 创建目录并复制文件
        mkdir -p jmeter-report
        cp -r jmeter/report_html/* jmeter-report/

        # 2. 【关键修复 A】处理 _dashboard
        # 如果存在 _dashboard，重命名为 dashboard
        if [ -d "jmeter-report/_dashboard" ]; then
          echo "Renaming _dashboard to dashboard..."
          mv jmeter-report/_dashboard jmeter-report/dashboard
        fi

        # 3. 【关键修复 B】修改 HTML 里的引用路径
        # 把所有的 _dashboard/ 替换为 dashboard/
        find jmeter-report -type f -name "*.html" -exec sed -i 's|_dashboard/|dashboard/|g' {} +

        # 4. 【关键修复 C】强制修复相对路径
        # 确保所有资源引用都相对于当前目录，而不是根目录
        # 这一步非常重要，防止浏览器去根目录找资源
        find jmeter-report -type f -name "*.html" -exec sed -i 's|src="/|src="./|g' {} +
        find jmeter-report -type f -name "*.html" -exec sed -i 's|href="/|href="./|g' {} +
        
        # 5. 【关键修复 D】添加 .nojekyll
        # 这个空文件告诉 GitHub Pages：不要忽略下划线文件夹，不要运行 Jekyll
        touch jmeter-report/.nojekyll
        
        # 6. 验证文件结构
        echo "=== 最终的文件结构 ==="
        ls -R jmeter-report

    # 11. 【修正】创建根目录跳转页 (这里改成了跳转到 JMeter 报告)
    - name: Create Root Redirect to JMeter
      run: |
        # 修改这里：指向 jmeter-report
        echo "<html><head><meta http-equiv='refresh' content='0; url=jmeter-report/index.html'></head><body>Redirecting...</body></html>" > index.html

    # 12. 创建 .nojekyll (双重保险)
    - name: Create .nojekyll for GitHub Pages
      run: |
        touch allure-report/.nojekyll
        touch jmeter-report/.nojekyll
        touch .nojekyll

    # 13. 部署到 GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        destination_dir: .
        keep_files: true