name: CI/CD with Allure and JMeter

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1511054331
          MYSQL_DATABASE: h3blog
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -p1511054331"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    # 1-5. 基础环境准备
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre wget

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"

    - name: Wait for MySQL
      run: |
        for i in {1..30}; do
          if mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 -e "SELECT 1"; then
            echo "MySQL is ready!"
            break
          fi
          echo "Waiting for MySQL... ($i/30)"
          sleep 2
        done

    - name: Import Database Schema and Data
      run: |
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 -e "CREATE DATABASE IF NOT EXISTS h3blog;"
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 h3blog < sql/01-create-db.sql
        mysql -h 127.0.0.1 -P 3306 -u root -p1511054331 h3blog < sql/02-data-dump.sql
        echo "Database imported successfully!"

    - name: Start Flask App (Fallback to flask run)
      run: |
        mkdir -p logs
        export FLASK_APP=app
        flask run --host=0.0.0.0 --port=5000 > logs/flask.log 2>&1 &

        echo "Waiting for Flask to start..."
        sleep 60  # 增加到 60 秒，给足初始化时间

        # 优化：使用循环重试 + 正确的状态码检查
        success=false
        for i in {1..20}; do
          echo "Checking Flask health... ($i/20)"

          # 方法1：检查状态码是否为 200
          status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000 2>&1 || echo "000")

          if [ "$status" = "200" ]; then
            echo "✓ Flask is running with status 200!"
            success=true
            break
          fi

          sleep 3
        done

        # 最终验证
        if [ "$success" != "true" ]; then
          echo "✗ Flask failed to start after multiple attempts"
          tail -100 logs/flask.log
          exit 1
        fi

    # 6. 运行单元测试
    - name: Run tests
      run: |
        # 清理旧的 Allure 结果
        rm -rf allure-results
        rm -rf reports/report.html
        
        pytest h3blog_test/testcases -v \
          --alluredir=allure-results \
          --html=reports/report.html \
          --self-contained-html
      env:
        DATABASE_URL: mysql+pymysql://root:1511054331@127.0.0.1:3306/h3blog
        REDIS_URL: redis://127.0.0.1:6379/1
      continue-on-error: true

    - name: Check Homepage and Extract Article ID
      run: |
        echo "=== Checking if homepage has articles ==="

        # 获取首页 HTML
        curl http://127.0.0.1:5000/ > /tmp/homepage.html

        # 直接打印 HTML 内容（调试用）
        echo "=== Homepage HTML Content ==="
        cat /tmp/homepage.html
        echo "=== End of HTML Content ==="

        # 检查是否有文章链接
        if grep -q 'href="/article/' /tmp/homepage.html; then
          echo "✓ Homepage has article links"

          # 提取第一个文章 ID
          ARTICLE_ID=$(grep -o 'href="/article/[^"]*"' /tmp/homepage.html | head -1 | sed 's/.*href="\/article\/\([^"]*\)".*/\1/')
          echo "First article ID found: $ARTICLE_ID"

          # 替换到 JMX 中
          sed -i "s|/article/\${articleId}/|/article/$ARTICLE_ID/|" jmeter/blog_test1.jmx
          echo "Updated JMX to use article ID: $ARTICLE_ID"
        else
          echo "✗ No article links found on homepage!"
          echo "Using fallback ID: 1"
          sed -i 's|/article/${articleId}/|/article/1/|' jmeter/blog_test1.jmx
        fi

    # 8. 下载并运行 JMeter
    - name: Download and Setup JMeter
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        ./apache-jmeter-5.6.3/bin/jmeter --version

    - name: Run JMeter Load Test
      run: |
        rm -rf jmeter/report_html jmeter/result.jtl
        
        # 降低并发，避免超时
        timeout 300 ./apache-jmeter-5.6.3/bin/jmeter -n -t jmeter/blog_test1.jmx \
          -l jmeter/result.jtl \
          -e -o jmeter/report_html \
          -Jhost=127.0.0.1 \
          -Jport=5000 \
          -Jthreads=10 \
          -Jloop=2

    - name: Check JMeter Results
      run: |
        echo "=== JMeter Summary ==="
        tail -20 jmeter/result.jtl
        if grep -q "s=\"false\"" jmeter/result.jtl; then
          echo "✗ JMeter test had errors"
          exit 1
        else
          echo "✓ JMeter test passed"
        fi

    # 9. 生成 Allure 报告
    - name: Generate Allure Report
      run: |
        rm -rf allure allure-report/*
        curl -L -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.36.0/allure-2.36.0.zip
        unzip allure.zip -d allure
        ALLURE_BIN=$(pwd)/allure/allure-2.36.0/bin/allure
        $ALLURE_BIN generate allure-results -o allure-report --clean

    # 10. 准备 JMeter 报告 (保持你的修复逻辑)
    - name: Prepare Standalone JMeter Report for Deploy
      run: |
        mkdir -p jmeter-report
        cp -r jmeter/report_html/* jmeter-report/

        # 处理 _dashboard -> dashboard (如果存在)
        if [ -d "jmeter-report/_dashboard" ]; then
          mv jmeter-report/_dashboard jmeter-report/dashboard
        fi
        
        # 修复路径
        find jmeter-report -type f -name "*.html" -exec sed -i 's|_dashboard/|dashboard/|g' {} +
        find jmeter-report -type f -name "*.html" -exec sed -i 's|src="/|src="./|g' {} +
        find jmeter-report -type f -name "*.html" -exec sed -i 's|href="/|href="./|g' {} +
        
        touch jmeter-report/.nojekyll
        echo "=== JMeter Report Preparation Complete ==="

    # 11. 调试步骤 (检查本地生成的文件)
    - name: 📂 Inspect Local JMeter Report Structure
      run: |
        echo "=== Checking local jmeter-report/ ==="
        ls -lh jmeter-report/
        if [ -d "jmeter-report/content" ]; then
          echo "✅ Local content/ directory exists."
        else
          echo "❌ Local content/ directory MISSING!"
          exit 1
        fi
        # 简单检查 index.html 是否引用了 content
        if grep -q "content/js/" jmeter-report/index.html; then
          echo "✅ Local index.html references content/js/"
        else
          echo "⚠️  Local index.html might use absolute paths (checking anyway)"
        fi

    # ==========================================================
    # 12. 整理部署包 (关键：隔离源码和产物)
    # ==========================================================
    - name: Organize Deployment Package (public/)
      run: |
        # 清理旧的 public 目录
        rm -rf public
        mkdir -p public
        
        # 1. 把 jmeter-report 整个复制进去
        cp -r jmeter-report public/jmeter-report
        
        # 2. 把 allure-report 整个复制进去
        cp -r allure-report public/allure-report
        
        # 3. 创建根目录重定向页 (指向 jmeter)
        echo "<html><head><meta http-equiv='refresh' content='0; url=jmeter-report/index.html'></head><body>Redirecting to JMeter Report...</body></html>" > public/index.html
        
        # 4. 关键：在 public 根目录创建 .nojekyll
        # 这告诉 GitHub Pages：不要运行 Jekyll，不要忽略下划线开头的文件夹
        touch public/.nojekyll
        
        # 5. 确保 jmeter-report 内部也有 .nojekyll (防止 content 被当作特殊目录)
        touch public/jmeter-report/.nojekyll
        
        echo "=== Contents of public/ directory (what will be deployed) ==="
        ls -lh public/
        echo "=== Contents of public/jmeter-report/ ==="
        ls -lh public/jmeter-report/
        echo "=== Verifying .nojekyll exists ==="
        ls -lh public/.nojekyll

    # ==========================================================
    # 13. 部署到 GitHub Pages
    # ==========================================================
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public      # 只发布 public 目录
        destination_dir: .         # 发布到 gh-pages 根目录
        keep_files: false          # 每次覆盖，防止旧文件残留

    # ==========================================================
    # 14. 【新增】审计步骤：检查 GitHub 上实际存储的文件
    # ==========================================================
    - name: 🔍 Audit - Check Files on GitHub gh-pages Branch
      run: |
        echo "=================================================="
        echo "🔍 AUDITING: What was actually pushed to GitHub?"
        echo "=================================================="
        
        # 配置 Git
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        
        # 克隆刚推送的 gh-pages 分支到临时目录
        # 注意：需要 token 权限，使用 github.token
        echo "Cloning gh-pages branch to /tmp/gh-pages-check..."
        git clone --branch gh-pages --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/gh-pages-check
        
        cd /tmp/gh-pages-check
        
        echo -e "\n--- [1] 📂 Full file tree on GitHub ---"
        ls -lh
        echo ""
        tree . || find . -type f
        
        echo -e "\n--- [2] 🔍 Checking for jmeter-report/content/ ---"
        if [ -d "jmeter-report/content" ]; then
          echo "✅ SUCCESS: jmeter-report/content/ exists on GitHub!"
          echo "   Files inside content/js:"
          ls -lh jmeter-report/content/js/ | head -10
        else
          echo "❌ FAILURE: jmeter-report/content/ is MISSING on GitHub!"
          echo "   This means the push failed or .gitignore filtered it out."
          exit 1
        fi
        
        echo -e "\n--- [3] 🔍 Checking for index.html ---"
        if [ -f "index.html" ]; then
          echo "✅ index.html exists on GitHub."
          cat index.html
        else
          echo "❌ index.html is MISSING on GitHub!"
          exit 1
        fi
        
        echo -e "\n--- [4] 🔍 Checking for .nojekyll ---"
        if [ -f ".nojekyll" ]; then
          echo "✅ .nojekyll exists on GitHub (Good, Jekyll will be skipped)."
        else
          echo "⚠️  WARNING: .nojekyll is MISSING on GitHub root."
          echo "   GitHub Pages might run Jekyll and filter out files."
        fi
        
        echo -e "\n=================================================="
        echo "✅ AUDIT COMPLETE: Files look good on GitHub side."
        echo "If the browser still shows 404, the issue might be"
        echo "browser cache or a subtle path issue in index.html."
        echo "Try opening: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/jmeter-report/index.html"
        echo "=================================================="