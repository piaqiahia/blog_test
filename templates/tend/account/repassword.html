{% extends 'tend/account/common/base.html' %}
{% import "tend/macros/_flash.html" as flash_macros %}
{% block css %}
{{super()}}
<link href="{{ url_for('main.static', filename='css/account.css')}}" rel="stylesheet">
<style>
    .avatar {
        width: 80px;
        padding: .25rem;
        background-color: #fff;
        border: 1px solid #dee2e6;
        border-radius: .25rem;
    }

    .select-avt {
        border: 1px solid rgb(202, 98, 14);
        box-shadow: 5px 5px 5px rgba(0.0.0, .5);
    }
</style>
{% endblock %}
{% block contents %}

<div class="container">
    <div class="row justify-content-md-center mt-5">
        <div class="col-md-8">
            {{flash_macros.flash_msg()}}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group row">
                    <label for="oldpassword" class="col-sm-3 col-form-label">当前密码<span class="asteriskField">*</span>:</label>
                    <div class="col-sm-9">
                        <input type="password" class="form-control" name="oldpassword" required>
                    </div>
                </div>
                <div class="form-group row">
                    <label for="password" class="col-sm-3 col-form-label"> 新密码<span class="asteriskField">*</span>:</label>
                    <div class="col-sm-9">
                        <input type="password" class="form-control" name="password" required>
                    </div>
                </div>
                <div class="form-group row">
                    <label for="password2" class="col-sm-3 col-form-label">新密码(重复)<span class="asteriskField">*</span>:</label>
                    <div class="col-sm-9">
                        <input type="password" class="form-control" name="password2" required>
                    </div>
                </div>

                <div class="form-group row">
                    <div class="col-sm-10">
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </div>
            </form>
        </div>

    </div>


</div>
{% endblock %}
{% block js %}
{{ super() }}
{% endblock %}
